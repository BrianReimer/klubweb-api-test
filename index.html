<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KlubWeb Test</title>
  <link rel="stylesheet" href="css/dbu.css">
</head>
<body>

  <!-- Screen 0: Forside -->
  <div id="screen-home" class="screen">
    <div class="home-wrapper">
      <img src="assets/dbu-logo.svg" alt="DBU" class="home-logo">
      <h1 class="home-title">Test af KlubWeb<br>API og Widgets</h1>
      <div class="home-buttons">
        <button id="btn-goto-api" class="btn btn-primary btn-home">API</button>
        <button id="btn-goto-widgets" class="btn btn-secondary btn-home">Widgets</button>
      </div>
    </div>
  </div>

  <!-- Screen A: Login -->
  <div id="screen-login" class="screen" hidden>
    <div class="login-wrapper">
      <img src="assets/dbu-logo.svg" alt="DBU" class="login-logo">
      <div class="card login-card">
        <h2>Log ind</h2>
        <form id="login-form" novalidate>
          <label for="username">Brugernavn</label>
          <input id="username" type="text" class="input" placeholder="Dit brugernavn" autocomplete="username" required>
          <label for="password">Adgangskode</label>
          <input id="password" type="password" class="input" placeholder="Din adgangskode" autocomplete="current-password" required>
          <button type="submit" class="btn btn-primary btn-full" id="btn-login">Log ind</button>
          <div id="login-error" class="error-box" hidden></div>
        </form>
      </div>
      <p style="margin-top:1.25rem;font-size:.8125rem;color:var(--dbu-gray);">DBU KlubWeb API — Testmiljø</p>
    </div>
  </div>

  <!-- Screen B: Endpoint Explorer -->
  <div id="screen-explorer" class="screen" hidden>
    <header class="site-header">
      <img src="assets/dbu-logo.svg" alt="DBU" class="header-logo">
      <span class="header-title">KlubWeb Test</span>
      <button id="tab-api" class="header-tab active">API</button>
      <button id="tab-widgets" class="header-tab">Widgets</button>
      <a href="https://klubweb-api-test-production.up.railway.app/webhook-view" target="_blank" class="btn header-webhook">Webhook ↗</a>
      <button id="btn-logout" class="btn header-logout">Log ud</button>
    </header>
    <nav id="endpoint-nav" class="endpoint-nav" role="navigation" aria-label="Endpoint grupper"></nav>
    <div id="endpoint-subnav" class="endpoint-subnav"></div>
    <main id="main-content" class="main-content" role="main"></main>
    <section id="widgets-panel" class="widgets-panel" hidden>
      <div class="widgets-toolbar">
        <label for="widget-code">JavaScript-kode</label>
        <button id="btn-run-widget" class="btn btn-primary">Vis</button>
      </div>
      <textarea id="widget-code" class="widget-textarea" spellcheck="false" placeholder="// Skriv JavaScript her...
document.getElementById('output').innerHTML = '<h2>Hej verden!</h2>';"></textarea>
      <div class="widgets-output-label">Output</div>
      <iframe id="widget-frame" class="widget-frame" sandbox="allow-scripts"></iframe>
    </section>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
